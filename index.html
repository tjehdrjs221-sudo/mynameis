<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>유석환 · 비전에셋</title>
  <meta property="og:title" content="유석환 · 매니저 · 비전에셋">
  <meta property="og:description" content="자산을 관리하는 것이 아니라, 성장시키는 파트너">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap");

    /* 1. 위젯 공간 확보를 위한 여백 설정 */
    .card-wrapper {
      padding-top: 60px !important; 
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: #060c18;
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .card-container {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(200, 175, 110, 0.2);
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 20px;
      border: 2px solid #c8af6e;
      padding: 5px;
      background: #060c18;
      object-fit: cover;
    }

    .name { color: #fff; font-size: 24px; font-weight: 700; margin-bottom: 5px; letter-spacing: -0.5px; }
    .title { color: #c8af6e; font-size: 15px; font-weight: 400; margin-bottom: 25px; opacity: 0.9; }
    
    .info-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 25px;
    }
    .info-item { display: flex; align-items: center; justify-content: center; color: #eee; font-size: 14px; margin-bottom: 12px; }
    .info-item:last-child { margin-bottom: 0; }
    
    .btn-group { display: grid; gap: 12px; }
    .btn {
      display: flex; align-items: center; justify-content: center;
      padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 500;
      text-decoration: none; transition: 0.3s;
    }
    .btn-primary { background: #c8af6e; color: #060c18; }
    .btn-secondary { border: 1px solid rgba(200,175,110,0.4); color: #c8af6e; }
  </style>
</head>
<body>

<div class="tradingview-widget-container" style="position: fixed; top: 0; left: 0; z-index: 100; width: 100%;">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
  {
    "symbols": [
      { "proName": "FOREXCOM:NSXUSD", "title": "나스닥 100" },
      { "proName": "FX_IDC:USDKRW", "title": "원/달러 환율" },
      { "proName": "COMEX:GC1!", "title": "골드(금)" },
      { "proName": "NYMEX:CL1!", "title": "크루드 오일" }
    ],
    "showSymbolLogo": true,
    "colorTheme": "dark",
    "isTransparent": true,
    "displayMode": "adaptive",
    "locale": "ko"
  }
  </script>
</div>

<canvas id="bg-canvas"></canvas>

<div class="card-wrapper">
  <div class="card-container">
    <div class="name">유석환</div>
    <div class="title">비전에셋 · 매니저</div>
    
    <div class="info-box">
        <div class="info-item">자산을 성장시키는 파트너</div>
    </div>

    <div class="btn-group">
      <a href="https://open.kakao.com/o/..." class="btn btn-primary">1:1 실시간 상담하기</a>
      <a href="tel:010-0000-0000" class="btn btn-secondary">전화 문의하기</a>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById("bg-canvas");
  const ctx = canvas.getContext("2d");
  let W, H, pts = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener("resize", resize);
  function rand(a,b){ return Math.random()*(b-a)+a; }
  for(let i=0;i<50;i++){ pts.push({ x:rand(0,W), y:rand(0,H), r:rand(0.5,2), a:rand(0.04,0.28), s:rand(0.12,0.4), d:rand(0,Math.PI*2) }); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,175,110,${p.a})`; ctx.fill();
      p.x+=Math.cos(p.d)*p.s; p.y+=Math.sin(p.d)*p.s;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    });
    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
