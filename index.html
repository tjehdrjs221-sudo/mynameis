<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>유석환 · 비전에셋</title>
  <meta property="og:title" content="유석환 · 매니저 · 비전에셋">
  <meta property="og:description" content="자산을 관리하는 것이 아니라, 성장시키는 파트너">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap");

    /* 위젯 여백 설정 */
    .card-wrapper { padding-top: 55px !important; }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #060c18; font-family: "Noto Sans KR", sans-serif; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    #bg-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    .card-wrapper { position: relative; z-index: 10; width: 100%; max-width: 430px; height: 100%; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card-inner { width: 100%; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(200, 175, 110, 0.2); border-radius: 32px; padding: 40px 24px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
    
    .profile-section { margin-bottom: 32px; }
    .profile-img-container { width: 110px; height: 110px; margin: 0 auto 20px; border-radius: 50%; padding: 4px; background: linear-gradient(135deg, #c8af6e 0%, #8e7943 100%); }
    .profile-img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #060c18; object-fit: cover; background: #1a1a1a; }
    
    .name-badge { display: inline-block; padding: 4px 12px; background: rgba(200, 175, 110, 0.1); border-radius: 100px; color: #c8af6e; font-size: 13px; font-weight: 500; margin-bottom: 8px; }
    .name { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
    .title { color: rgba(255,255,255,0.6); font-size: 16px; font-weight: 300; margin-bottom: 30px; }
    
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px; border-radius: 16px; font-size: 15px; font-weight: 500; text-decoration: none; transition: 0.2s; }
    .btn-main { grid-column: span 2; background: #c8af6e; color: #060c18; }
    .btn-sub { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; }
    .btn-save { grid-column: span 2; margin-top: 10px; background: #fff; color: #060c18; }
    
    svg { width: 20px; height: 20px; }
  </style>
</head>
<body>

<div class="tradingview-widget-container" style="position: fixed; top: 0; left: 0; z-index: 100; width: 100%;">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
  {
    "symbols": [
      { "proName": "FOREXCOM:NSXUSD", "title": "나스닥 100" },
      { "proName": "FX_IDC:USDKRW", "title": "원/달러 환율" },
      { "proName": "COMEX:GC1!", "title": "골드(금)" },
      { "proName": "NYMEX:CL1!", "title": "크루드 오일" }
    ],
    "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "ko"
  }
  </script>
</div>

<canvas id="bg-canvas"></canvas>

<div class="card-wrapper">
  <div class="card-inner">
    <div class="profile-section">
      <div class="profile-img-container">
        <div class="profile-img"></div> 
      </div>
      <div class="name-badge">VISION ASSET</div>
      <h1 class="name">유석환</h1>
      <p class="title">자산을 성장시키는 파트너</p>
    </div>

    <div class="action-grid">
      <a href="#" class="btn btn-main">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        실시간 상담하기
      </a>
      <a href="#" class="btn btn-sub">인스타그램</a>
      <a href="#" class="btn btn-sub">공유하기</a>
      <button class="btn btn-save">연락처 저장</button>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById("bg-canvas");
  const ctx = canvas.getContext("2d");
  let W, H, pts = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener("resize", resize);
  function rand(a,b){ return Math.random()*(b-a)+a; }
  for(let i=0;i<50;i++){ pts.push({ x:rand(0,W), y:rand(0,H), r:rand(0.5,2), a:rand(0.04,0.28), s:rand(0.12,0.4), d:rand(0,Math.PI*2) }); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,175,110,${p.a})`; ctx.fill();
      p.x+=Math.cos(p.d)*p.s; p.y+=Math.sin(p.d)*p.s;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    });
    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
