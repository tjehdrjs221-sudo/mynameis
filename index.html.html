<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>유석환 · 비전에셋</title>
  <meta property="og:title" content="유석환 · 매니저 · 비전에셋">
  <meta property="og:description" content="자산을 관리하는 것이 아니라, 성장시키는 파트너">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap");

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: #060c18;
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── 카드 래퍼: 화면 꽉 채우되 최대 430px ── */
    .card-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 860px;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeInUp 0.85s cubic-bezier(0.22,1,0.36,1) 0.15s forwards;
      padding: 0 16px;
      display: flex;
      align-items: center;
    }
    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── 카드: 세로로 꽉 채우는 비율 ── */
    .card {
      width: 100%;
      height: auto;
      min-height: min(820px, calc(100vh - 32px));
      background: rgba(10, 18, 32, 0.94);
      border-radius: 28px;
      border: 0.5px solid rgba(200,169,110,0.22);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        155deg,
        rgba(14,28,58,0.5) 0%,
        rgba(6,12,24,0.2) 45%,
        rgba(10,22,44,0.55) 100%
      );
      pointer-events: none;
      z-index: 0;
      border-radius: 28px;
    }

    /* ── 상단 커버 영역 ── */
    .card-cover {
      position: relative;
      z-index: 1;
      padding: 28px 24px 0;
      flex-shrink: 0;
    }

    .deco-tr {
      position: absolute;
      top: -70px; right: -70px;
      width: 200px; height: 200px;
      background: rgba(20,36,70,0.55);
      border-radius: 50%;
      pointer-events: none;
    }
    .deco-bl {
      position: absolute;
      bottom: -40px; left: -40px;
      width: 130px; height: 130px;
      background: rgba(14,26,52,0.45);
      border-radius: 50%;
      pointer-events: none;
    }

    /* ── 로고 뱃지 ── */
    .logo-badge-inner {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(200,169,110,0.07);
      border: 0.5px solid rgba(200,169,110,0.35);
      border-radius: 7px;
      padding: 6px 13px 6px 10px;
      margin-bottom: 22px;
    }
    .logo-icon svg { width: 20px; height: 20px; display: block; }
    .logo-main { font-size: 11px; font-weight: 700; color: #c8a96e; letter-spacing: 0.13em; line-height: 1.3; }
    .logo-sub  { font-size: 8px; color: rgba(200,169,110,0.45); letter-spacing: 0.09em; }
    .badge-divider { width: 0.5px; height: 24px; background: rgba(200,169,110,0.18); margin: 0 3px; }
    .badge-role { font-size: 9px; color: rgba(180,200,230,0.45); letter-spacing: 0.13em; }

    /* ── 프로필 ── */
    .profile-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }
    .profile-img-wrap { position: relative; flex-shrink: 0; }
    .profile-img {
      width: 74px; height: 74px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 1.5px solid rgba(200,169,110,0.65);
      display: block;
    }
    .profile-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 0.5px solid rgba(200,169,110,0.18);
      animation: ringPulse 3.2s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%,100% { opacity:0.25; transform:scale(1); }
      50%      { opacity:0.65; transform:scale(1.05); }
    }

    .name-en { font-size: 9px; color: rgba(200,169,110,0.55); letter-spacing: 0.15em; margin-bottom: 4px; }
    .name     { font-size: 26px; font-weight: 700; color: #edf0f7; letter-spacing: -0.025em; margin-bottom: 5px; }
    .job-row  { display: flex; align-items: center; gap: 7px; }
    .job-title { font-size: 12px; color: #7888a2; }
    .dot      { width: 2px; height: 2px; background: #2a3c56; border-radius: 50%; }
    .company  { font-size: 12px; color: #445870; }

    /* ── 태그라인 ── */
    .tagline-wrap { margin-bottom: 0; }
    .tagline-label { font-size: 8px; color: rgba(200,169,110,0.35); letter-spacing: 0.2em; margin-bottom: 7px; }
    .tagline {
      font-size: 14px; font-weight: 500;
      color: #c0d0e8;
      line-height: 1.72;
      padding: 13px 17px;
      background: rgba(8,16,32,0.55);
      border-left: 2px solid #c8a96e;
      border-radius: 0 9px 9px 0;
      letter-spacing: -0.01em;
    }

    /* ── 골드 구분선 shimmer ── */
    .gold-line {
      height: 1px;
      position: relative;
      overflow: hidden;
      margin: 0 24px;
      flex-shrink: 0;
    }
    .gold-line::before {
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(90deg, transparent, rgba(200,169,110,0.45) 30%, rgba(200,169,110,0.45) 70%, transparent);
    }
    .gold-line::after {
      content:"";
      position:absolute; top:0; left:-60%; width:60%; height:100%;
      background: linear-gradient(90deg, transparent, rgba(255,220,150,0.85), transparent);
      animation: shimmer 3.5s ease-in-out infinite;
    }
    @keyframes shimmer { 0%{left:-60%} 100%{left:160%} }

    /* ── 연락처 바디 ── */
    .card-body {
      padding: 20px 24px 28px;
      position: relative; z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .section-label { font-size: 9px; color: rgba(200,169,110,0.28); letter-spacing: 0.2em; margin-bottom: 14px; }

    .contact-list { display: flex; flex-direction: column; gap: 4px; }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      padding: 11px 12px;
      border-radius: 12px;
      border: 0.5px solid transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .contact-item:active {
      background: rgba(200,169,110,0.07);
      border-color: rgba(200,169,110,0.18);
    }
    .icon-wrap {
      width: 40px; height: 40px;
      border-radius: 11px;
      background: rgba(8,16,32,0.7);
      border: 0.5px solid rgba(200,169,110,0.18);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-wrap svg { width: 15px; height: 15px; }
    .contact-label { font-size: 10px; color: #2e4868; margin-bottom: 3px; }
    .contact-value { font-size: 15px; color: #aabfd8; font-weight: 400; }

    .divider { border: none; border-top: 0.5px solid rgba(255,255,255,0.04); margin: 4px 0 16px; }

    /* ── 푸터 ── */
    .footer { display: flex; align-items: center; justify-content: space-between; }
    .footer-brand { display: flex; align-items: center; gap: 6px; }
    .footer-brand-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(200,169,110,0.45); }
    .footer-brand-text { font-size: 10px; color: rgba(200,169,110,0.45); letter-spacing: 0.1em; font-weight: 500; }

    .save-btn {
      background: rgba(200,169,110,0.08);
      border: 0.5px solid rgba(200,169,110,0.32);
      border-radius: 10px;
      color: #c8a96e;
      font-size: 12px;
      padding: 10px 18px;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      font-family: inherit;
      transition: background 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .save-btn:active { background: rgba(200,169,110,0.16); transform: scale(0.97); }
    .save-btn svg { width: 13px; height: 13px; }
  </style>
</head>

<script>
  const canvas = document.getElementById("bg-canvas");
  const ctx = canvas.getContext("2d");
  let W, H, pts = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  function rand(a,b){ return Math.random()*(b-a)+a; }
  for(let i=0;i<50;i++){
    pts.push({ x:rand(0,window.innerWidth), y:rand(0,window.innerHeight),
               r:rand(0.5,2), a:rand(0.04,0.28), s:rand(0.12,0.4), d:rand(0,Math.PI*2) });
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,175,110,${p.a})`;
      ctx.fill();
      p.x+=Math.cos(p.d)*p.s;
      p.y+=Math.sin(p.d)*p.s;
      if(p.x<-5)p.x=W+5; if(p.x>W+5)p.x=-5;
      if(p.y<-5)p.y=H+5; if(p.y>H+5)p.y=-5;
    });
    requestAnimationFrame(draw);
  }
  draw();

  function handleSave(){
    const v="BEGIN:VCARD\nVERSION:3.0\nFN:유석환\nORG:비전에셋\nTITLE:매니저\nTEL;TYPE=CELL:010-3489-3808\nURL:https://vsasset100.com\nEND:VCARD";
    const b=new Blob([v],{type:"text/vcard"});
    const u=URL.createObjectURL(b);
    const a=document.createElement("a");
    a.href=u; a.download="유석환_비전에셋.vcf"; a.click();
    URL.revokeObjectURL(u);
  }
</script>
